name: Build and Publish Android Update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - "master"
  workflow_dispatch:
    inputs:
      forceUpdate:
        description: "Force update for users"
        required: false
        default: false
        type: boolean
      releaseNotes:
        description: "Release notes shown in in-app updater"
        required: false
        default: ""
        type: string

jobs:
  publish-update:
    if: github.ref_name == 'master' && github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    concurrency:
      group: release-master
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Decode Android signing keystore
        shell: bash
        run: |
          mkdir -p keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > keystore/release.jks

      - name: Create local.properties for CI signing
        shell: bash
        run: |
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_DIR" ]; then
            echo "ANDROID_SDK_ROOT / ANDROID_HOME not found on runner"
            exit 1
          fi

          cat > local.properties <<EOF
          sdk.dir=$SDK_DIR
          RELEASE_STORE_FILE=../keystore/release.jks
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9jbmdxZXVlaHJ6a3dqc2xyaGNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzU4NTAsImV4cCI6MjA5MTk1MTg1MH0.j5YtEH85fiDx2XJBpyBNT1bsQl81Axihb9uZDtDIO-g
          GOOGLE_WEB_CLIENT_ID=139161182086-rk5tes8e2hdhvkc698sd1rkb7i7j0lrf.apps.googleusercontent.com
          EOF

      - name: Show generated local.properties
        shell: bash
        run: cat local.properties

      - name: Validate auth release config
        shell: bash
        run: |
          if ! grep -q '^SUPABASE_KEY=[^[:space:]]\+' local.properties; then
            echo "SUPABASE_KEY is missing from CI local.properties"
            exit 1
          fi

          if ! grep -q '^GOOGLE_WEB_CLIENT_ID=[^[:space:]]\+' local.properties; then
            echo "GOOGLE_WEB_CLIENT_ID is missing from CI local.properties"
            exit 1
          fi

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION_CODE=$(grep -m1 'versionCode\s*=\s*' app/build.gradle.kts | sed -E 's/[^0-9]//g')
          VERSION_NAME=$(grep -m1 'versionName\s*=\s*"' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')

          next_version() {
            local current="$1"

            if [[ "$current" =~ ^2\.0$ ]]; then
              echo "2.0.1"
            elif [[ "$current" =~ ^2\.0\.([0-9]+)$ ]]; then
              local patch="${BASH_REMATCH[1]}"
              echo "2.0.$((patch + 1))"
            else
              echo "2.0"
            fi
          }

          NEXT_CODE=$((VERSION_CODE + 1))
          NEXT_NAME=$(next_version "$VERSION_NAME")
          TAG_NAME="v$NEXT_NAME"

          while git rev-parse "$TAG_NAME" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "refs/tags/$TAG_NAME" >/dev/null 2>&1; do
            NEXT_CODE=$((NEXT_CODE + 1))
            NEXT_NAME=$(next_version "$NEXT_NAME")
            TAG_NAME="v$NEXT_NAME"
          done

          perl -0pi -e "s/versionCode\s*=\s*\d+/versionCode = $NEXT_CODE/; s/versionName\s*=\s*\"[^\"]+\"/versionName = \"$NEXT_NAME\"/" app/build.gradle.kts

          if git diff --quiet -- app/build.gradle.kts; then
            echo "Version bump did not modify app/build.gradle.kts"
            exit 1
          fi

          if [[ -n "${{ github.event.inputs.releaseNotes }}" ]]; then
            RELEASE_NOTES="${{ github.event.inputs.releaseNotes }}"
          else
            RELEASE_NOTES="Automated release $NEXT_NAME from ${GITHUB_SHA::7}"
          fi

          if [[ "${{ github.event.inputs.forceUpdate }}" == "true" ]]; then
            FORCE_UPDATE="true"
          else
            FORCE_UPDATE="false"
          fi

          echo "version_code=$NEXT_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$NEXT_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_notes=$RELEASE_NOTES" >> "$GITHUB_OUTPUT"
          echo "force_update=$FORCE_UPDATE" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Resolve APK output path
        id: apk
        shell: bash
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' ! -name '*-unsigned.apk' | sort | head -n1)
          if [[ -z "$APK_PATH" ]]; then
            echo "No signed APK found in app/build/outputs/apk/release"
            echo "Available APK files:"
            find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | sort || true
            exit 1
          fi

          echo "Resolved APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify APK signature
        shell: bash
        run: |
          APKSIGNER_PATH=$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools" -type f -name apksigner | sort | tail -n1)
          if [[ -z "$APKSIGNER_PATH" ]]; then
            echo "apksigner not found in Android build-tools"
            exit 1
          fi

          "$APKSIGNER_PATH" verify --verbose --print-certs "${{ steps.apk.outputs.apk_path }}"

      - name: Commit version bump and push tag
        shell: bash
        run: |
          git add app/build.gradle.kts
          git commit -m "chore(release): ${{ steps.meta.outputs.tag_name }} [skip release]"
          git tag "${{ steps.meta.outputs.tag_name }}"
          git push origin HEAD:master "${{ steps.meta.outputs.tag_name }}"

      - name: Sync dev branches with released master commit
        shell: bash
        run: |
          # Use the exact released commit from this job, not origin/master (can be stale until refetch).
          RELEASE_COMMIT="$(git rev-parse HEAD)"

          # Dev branches that receive the release commit after every master release.
          TARGET_BRANCHES=("jayesh" "Shivanshs")

          for TARGET in "${TARGET_BRANCHES[@]}"; do
            git fetch origin "$TARGET" >/dev/null 2>&1 || true

            if ! git show-ref --verify --quiet "refs/remotes/origin/$TARGET"; then
              git push origin "$RELEASE_COMMIT:refs/heads/$TARGET"
              echo "$TARGET branch created and synced to release commit $RELEASE_COMMIT"
              continue
            fi

            # Always bring the released commit back to each dev branch.
            git checkout -B "$TARGET-sync" "origin/$TARGET"
            if git merge --no-edit "$RELEASE_COMMIT"; then
              git push origin HEAD:"$TARGET"
              echo "$TARGET branch merged with released commit $RELEASE_COMMIT"
            else
              echo "Automatic merge into $TARGET failed due to conflicts"
              echo "Please resolve conflicts manually by merging master into $TARGET"
              git merge --abort || true
              exit 1
            fi
          done

          git checkout master

      - name: Upload APK to GitHub Release
        id: release_asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.meta.outputs.tag_name }}"
          ASSET_NAME="algoviz-v${{ steps.meta.outputs.version_name }}-${{ steps.meta.outputs.version_code }}.apk"
          cp "${{ steps.apk.outputs.apk_path }}" "$ASSET_NAME"

          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "${{ steps.meta.outputs.release_notes }}"

          gh release upload "$TAG_NAME" "$ASSET_NAME" --clobber

          APK_URL=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" --jq ".assets[] | select(.name==\"${ASSET_NAME}\") | .browser_download_url" | head -n1)
          if [[ -z "$APK_URL" ]]; then
            echo "Could not resolve uploaded release asset URL"
            exit 1
          fi
          echo "apk_public_url=$APK_URL" >> "$GITHUB_OUTPUT"

      - name: Upload update metadata asset to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          VERSION_CODE: ${{ steps.meta.outputs.version_code }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          APK_PUBLIC_URL: ${{ steps.release_asset.outputs.apk_public_url }}
          RELEASE_NOTES: ${{ steps.meta.outputs.release_notes }}
          FORCE_UPDATE: ${{ steps.meta.outputs.force_update }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const payload = {
            version_code: Number(process.env.VERSION_CODE),
            version_name: process.env.VERSION_NAME,
            apk_url: process.env.APK_PUBLIC_URL,
            release_notes: process.env.RELEASE_NOTES,
            force_update: String(process.env.FORCE_UPDATE).toLowerCase() === 'true'
          };

          fs.writeFileSync('algoviz-update.json', JSON.stringify(payload, null, 2));
          NODE

          gh release upload "$TAG_NAME" algoviz-update.json --clobber

      - name: Publish APK metadata (Supabase)
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APK_PUBLIC_URL: ${{ steps.release_asset.outputs.apk_public_url }}
          VERSION_CODE: ${{ steps.meta.outputs.version_code }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          RELEASE_NOTES: ${{ steps.meta.outputs.release_notes }}
          FORCE_UPDATE: ${{ steps.meta.outputs.force_update }}
        run: node scripts/release/publish-update.mjs

      - name: Upload built APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: algoviz-release-apk
          path: ${{ steps.apk.outputs.apk_path }}
