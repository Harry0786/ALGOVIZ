name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Public fallbacks used when GitHub Actions secrets are not configured yet.
  DEFAULT_SUPABASE_URL: https://zosawqjebxkjppwtkegx.supabase.co
  DEFAULT_GOOGLE_WEB_CLIENT_ID: 755994556793-ra0a3m34q7etiinrlsum293hiq267ngd.apps.googleusercontent.com
  DEFAULT_SUPABASE_KEY: ci-placeholder-key

on:
  push:
    branches:
      - master
      - Shivanshs
  pull_request:
    branches:
      - master
      - Shivanshs
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Create local.properties for CI
        shell: bash
        env:
          SECRET_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SECRET_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SECRET_GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_DIR" ]; then
            echo "ANDROID_SDK_ROOT / ANDROID_HOME not found on runner"
            exit 1
          fi

          SUPABASE_URL="${SECRET_SUPABASE_URL:-$DEFAULT_SUPABASE_URL}"
          SUPABASE_KEY="${SECRET_SUPABASE_KEY:-$DEFAULT_SUPABASE_KEY}"
          GOOGLE_WEB_CLIENT_ID="${SECRET_GOOGLE_WEB_CLIENT_ID:-$DEFAULT_GOOGLE_WEB_CLIENT_ID}"

          cat > local.properties <<EOF
          sdk.dir=$SDK_DIR
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_KEY=$SUPABASE_KEY
          GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID
          EOF

          if [ -z "$SECRET_SUPABASE_KEY" ]; then
            echo "SUPABASE_KEY secret is not set — using CI placeholder for compile-only build."
            echo "Add SUPABASE_KEY in Settings → Secrets and variables → Actions for production-like CI."
          fi

      - name: Build debug APK
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: algoviz-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Create local.properties for CI
        shell: bash
        env:
          SECRET_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SECRET_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SECRET_GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: |
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_DIR" ]; then
            echo "ANDROID_SDK_ROOT / ANDROID_HOME not found on runner"
            exit 1
          fi

          SUPABASE_URL="${SECRET_SUPABASE_URL:-$DEFAULT_SUPABASE_URL}"
          SUPABASE_KEY="${SECRET_SUPABASE_KEY:-$DEFAULT_SUPABASE_KEY}"
          GOOGLE_WEB_CLIENT_ID="${SECRET_GOOGLE_WEB_CLIENT_ID:-$DEFAULT_GOOGLE_WEB_CLIENT_ID}"

          cat > local.properties <<EOF
          sdk.dir=$SDK_DIR
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_KEY=$SUPABASE_KEY
          GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID
          EOF

      - name: Run unit tests
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon --stacktrace
