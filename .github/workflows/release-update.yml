name: Build and Publish Android Update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      forceUpdate:
        description: "Force update for users"
        required: false
        default: false
        type: boolean
      releaseNotes:
        description: "Release notes shown in in-app updater"
        required: false
        default: ""
        type: string

jobs:
  publish-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tagged commit is on master
        shell: bash
        if: github.ref_type == 'tag'
        run: |
          git fetch origin master
          TAG_SHA="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/master; then
            echo "Tag $GITHUB_REF_NAME is not on origin/master. Release is blocked by branch policy."
            exit 1
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Decode Android signing keystore
        shell: bash
        run: |
          mkdir -p keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > keystore/release.jks

      - name: Restore google-services.json
        shell: bash
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Create local.properties for CI signing
        shell: bash
        run: |
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK_DIR" ]; then
            echo "ANDROID_SDK_ROOT / ANDROID_HOME not found on runner"
            exit 1
          fi

          cat > local.properties <<EOF
          sdk.dir=$SDK_DIR
          RELEASE_STORE_FILE=../keystore/release.jks
          RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Show generated local.properties
        shell: bash
        run: cat local.properties

      - name: Build release APK
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          VERSION_CODE=$(grep -m1 'versionCode\s*=\s*' app/build.gradle.kts | sed -E 's/[^0-9]//g')
          VERSION_NAME_FROM_GRADLE=$(grep -m1 'versionName\s*=\s*"' app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')

          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == v* ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
          else
            VERSION_NAME="$VERSION_NAME_FROM_GRADLE"
          fi

          if [[ -n "${{ github.event.inputs.releaseNotes }}" ]]; then
            RELEASE_NOTES="${{ github.event.inputs.releaseNotes }}"
          else
            RELEASE_NOTES="Automated release $VERSION_NAME"
          fi

          if [[ "${{ github.event.inputs.forceUpdate }}" == "true" ]]; then
            FORCE_UPDATE="true"
          else
            FORCE_UPDATE="false"
          fi

          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "release_notes=$RELEASE_NOTES" >> "$GITHUB_OUTPUT"
          echo "force_update=$FORCE_UPDATE" >> "$GITHUB_OUTPUT"

      - name: Install publish dependencies
        shell: bash
        run: npm install firebase-admin@12 --no-save

      - name: Upload APK to GitHub Release
        id: release_asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="$GITHUB_REF_NAME"
          ASSET_NAME="algoviz-v${{ steps.meta.outputs.version_name }}-${{ steps.meta.outputs.version_code }}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$ASSET_NAME"

          gh release view "$TAG_NAME" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "${{ steps.meta.outputs.release_notes }}"

          gh release upload "$TAG_NAME" "$ASSET_NAME" --clobber

          APK_URL=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" --jq ".assets[] | select(.name==\"${ASSET_NAME}\") | .browser_download_url" | head -n1)
          if [[ -z "$APK_URL" ]]; then
            echo "Could not resolve uploaded release asset URL"
            exit 1
          fi
          echo "apk_public_url=$APK_URL" >> "$GITHUB_OUTPUT"

      - name: Publish APK and Firestore metadata
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          APK_PUBLIC_URL: ${{ steps.release_asset.outputs.apk_public_url }}
          APK_PATH: app/build/outputs/apk/release/app-release.apk
          VERSION_CODE: ${{ steps.meta.outputs.version_code }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          RELEASE_NOTES: ${{ steps.meta.outputs.release_notes }}
          FORCE_UPDATE: ${{ steps.meta.outputs.force_update }}
        run: node scripts/release/publish-update.mjs

      - name: Upload built APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: algoviz-release-apk
          path: app/build/outputs/apk/release/app-release.apk
